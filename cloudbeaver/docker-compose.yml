version: '3.8'

services:
  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: cloudbeaver
    restart: always  # 建议加上，确保容器异常退出后能自动重启
    user: root
    ports:
      - "8978:8978"
    volumes:
      - ./data:/opt/cloudbeaver/workspace
#    stdin_open: true # 对应 -i
#    tty: true        # 对应 -t